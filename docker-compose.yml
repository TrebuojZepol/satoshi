# Local Bitcoin Core (regtest) + optional Postgres for DATABASE_URL.
# Start: docker compose up -d
# RPC: http://127.0.0.1:18443  user/pass: satoshifi / satoshifi
# Postgres: postgresql://satoshifi:satoshifi@localhost:5432/satoshifi
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: satoshifi
      POSTGRES_PASSWORD: satoshifi
      POSTGRES_DB: satoshifi
    ports:
      - "5432:5432"
    volumes:
      - satoshifi_pg:/var/lib/postgresql/data

  bitcoind:
    image: bitcoin/bitcoin:27.2
    command:
      - -regtest
      - -server=1
      - -txindex=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=satoshifi
      - -rpcpassword=satoshifi
      - -fallbackfee=0.0002
    ports:
      - "18443:18443"
    volumes:
      - bitcoind_data:/home/bitcoin/.bitcoin

volumes:
  bitcoind_data:
  satoshifi_pg:
